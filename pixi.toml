[workspace]
channels = ["conda-forge"]
name = "gen3c"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]
test-env = { cmd = "LD_LIBRARY_PATH=$CONDA_PREFIX/lib:$LD_LIBRARY_PATH CUDA_HOME=$CONDA_PREFIX PYTHONPATH=$PIXI_PROJECT_ROOT python scripts/test_environment.py" }
download-checkpoints = { cmd = "LD_LIBRARY_PATH=$CONDA_PREFIX/lib:$LD_LIBRARY_PATH CUDA_HOME=$CONDA_PREFIX PYTHONPATH=$PIXI_PROJECT_ROOT python scripts/download_gen3c_checkpoints.py --checkpoint_dir checkpoints" }
gen3c-single-image = { cmd = "LD_LIBRARY_PATH=$CONDA_PREFIX/lib:$LD_LIBRARY_PATH CUDA_HOME=$CONDA_PREFIX PYTHONPATH=$PIXI_PROJECT_ROOT python cosmos_predict1/diffusion/inference/gen3c_single_image.py --checkpoint_dir checkpoints --guidance 1 --foreground_masking" }

[dependencies]
python = "3.10.*"
pip = "25.0.*"
cmake = "*"
ninja = "*"
gcc = "12.4.0.*"
gxx = "12.4.0.*"
cuda = "12.4.*"
cuda-nvcc = "12.4.*"
cuda-toolkit = "12.4.*"

[pypi-dependencies]
attrs = "==25.1.0"
better-profanity = "==0.7.0"
boto3 = "==1.35.99"
decord = "==0.6.0"
diffusers = "==0.32.2"
einops = "==0.8.1"
huggingface-hub = "==0.29.2"
hydra-core = "==1.3.2"
imageio = { version = "==2.37.0", extras = ["pyav", "ffmpeg"] }
iopath = "==0.1.10"
ipdb = "==0.13.13"
loguru = "==0.7.2"
mediapy = "==1.2.2"
megatron-core = "==0.10.0"
nltk = "==3.9.1"
numpy = "==1.26.4"
nvidia-ml-py = "==12.535.133"
omegaconf = "==2.3.0"
opencv-python = "==4.10.0.84"
pandas = "==2.2.3"
peft = "==0.14.0"
pillow = "==11.1.0"
protobuf = "==4.25.3"
pynvml = "==12.0.0"
pyyaml = "==6.0.2"
